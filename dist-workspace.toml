# dist configuration — produces per-target binary archives plus
# shell/powershell installers. release-please owns the whole release: it
# publishes the `bougie-v<version>` GitHub Release (creating the tag), and
# the `release: published` event triggers dist to build the binaries and
# upload them onto that release; publish-mirror.yml then fans them out to R2.
# See RELEASE.md for the bigger picture.
#
# Edit this file when adding targets / installers / mirror config, then
# regenerate the workflow with:
#     dist generate
# which rewrites .github/workflows/bougie-release.yml. NOTE: `dist generate`
# emits an `on: push: tags` trigger; we hand-edit it to `on: release:
# published` (release-please creates tags via the API, which doesn't reliably
# fire `push`). Re-apply that trigger edit after any regenerate.

[workspace]
members = ["cargo:."]

[dist]
# Pin the dist version that CI runs — bumps come through PRs so the
# generated release.yml is updated in lockstep.
cargo-dist-version = "0.32.0"

# Workspace has 25 crates; only `bougie` ships binaries. The default
# `dist = false` opts every package out; the bougie crate opts itself
# back in via `[package.metadata.dist] dist = true`.
dist = false

# Build each dist=true package with its own `cargo build -p <pkg>`
# rather than one workspace-wide `cargo build --workspace`. Required
# on Windows: `sandbox-run` has a top-level compile_error! on
# non-Unix targets and is only pulled in by bougie via a
# `[target.'cfg(unix)'.dependencies]` gate. A workspace build would
# compile it regardless and fail; a `-p bougie` build on Windows
# skips it entirely. Matches what `ci.yml` already does for the
# Windows leg of the test matrix.
precise-builds = true

# CI provider
ci = "github"

# Generate both shell and powershell installers (uv-style:
# `curl ... | sh` on Unix, `irm ... | iex` on Windows).
installers = ["shell", "powershell"]

# Archive formats per platform.
windows-archive = ".zip"
unix-archive = ".tar.gz"

# Target triples we ship prebuilt binaries for. Linux gets both gnu
# and musl so users on older distros and on Alpine both get a working
# binary; macOS is Apple Silicon only; Windows is x64-only. No aarch64
# Linux and no Intel macOS.
targets = [
    "x86_64-unknown-linux-gnu",
    "x86_64-unknown-linux-musl",
    "aarch64-apple-darwin",
    "x86_64-pc-windows-msvc",
]

# Skip auto-including README/LICENSE/CHANGELOG in every archive — keeps
# the tarballs to just the binaries the installer needs to drop on
# PATH. (CHANGELOG.md still ends up in the GitHub release notes.)
auto-includes = false

# release-please publishes the GitHub Release (with the changelog body) and
# creates the tag; dist only attaches the built binaries. `create-release =
# false` makes dist upload onto that pre-existing release rather than create
# its own — which would collide with release-please's. The release is already
# published, so dist's un-draft step is a harmless no-op. See
# release-please.yml.
create-release = false

# dist runs `generate --check` on startup and hard-errors if
# bougie-release.yml differs from what it would generate. We deliberately
# hand-edit that file's trigger to `on: release: published` (see the note by
# `create-release` and the header of bougie-release.yml), so tell dist we own
# the CI file and to skip the check. Without this dist aborts every release
# run with "bougie-release.yml has out of date contents and needs to be
# regenerated".
allow-dirty = ["ci"]

# Don't run dist on PRs — CI already covers building.
pr-run-mode = "skip"

# release-please tags as `bougie-v<version>` rather than the bare
# `v<version>` dist defaults to. Without this dist's release.yml
# wouldn't trigger on the tag release-please pushes.
tag-namespace = "bougie"

# Where the shell installer drops the binaries. First match wins;
# matches uv's layout so installs land on PATH without extra config.
install-path = ["$XDG_BIN_HOME/", "$XDG_DATA_HOME/../bin", "~/.local/bin"]

# Download URL precedence: the installer tries the bougie origin
# mirror first (low latency, no GitHub anonymous rate limits in CI),
# falls back to the GitHub release if the mirror is offline / empty
# / hasn't received the new tag yet. The origin is a Hetzner box
# (cresset-tools/infra hosts/origin) — see RELEASE.md.
hosting = ["github"]
# Versioned artifacts live at
# `<host>/github/bougie/releases/download/<tag>/<file>` — the same
# layout publish-mirror.yml rsyncs to.
simple-download-url = "https://releases.bougie.tools/github/bougie/releases/download/{tag}"

# Run the custom publish-mirror job after the release is announced.
# The file lives at .github/workflows/publish-mirror.yml.
post-announce-jobs = ["./publish-mirror"]

# publish-mirror only needs to read the artifacts the build jobs
# uploaded; no write permissions on the repo.
github-custom-job-permissions = { "publish-mirror" = { contents = "read" } }

# Both binaries ship in every archive — `bgx` is the uvx-equivalent
# short alias for `bougie tool run`. The test-only `fake-redis` bin
# is gated behind the `test-fixtures` feature and not built in
# release mode.
[dist.binaries]
"*" = ["bougie", "bgx"]
