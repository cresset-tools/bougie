# release-plz config — see https://release-plz.dev/docs/config
#
# bougie is not (yet) on crates.io and ships via GitHub Releases. The
# `release-plz release` command creates the tag + GH release; a separate
# build workflow can listen for the `release: published` event later
# when there's a binary distribution pipeline to wire up.

[workspace]
# Don't run `cargo publish` — bougie isn't on crates.io.
publish = false
# Skip `cargo package`'s verify-by-build step. The verify step strips
# `path` from intra-workspace deps and tries to re-resolve them from
# crates.io, which fails because none of bougie's helper crates are
# published. The version-detection step that release-plz runs
# internally also invokes cargo package; without this knob it stops on
# the first verify error.
publish_no_verify = true
# Create a tag + GitHub release when a release lands.
git_release_enable = true
# Match the project's commit-message conventions: a single CHANGELOG.md
# at the repo root, conventional-ish prefixes (`ci:`, `ext list:`, …).
changelog_update = true
# Don't post sections like "Other" for misc commits — keep notes tight.
git_release_body = """
{% if version.is_prerelease %}_Prerelease._{% endif %}
{{ changelog }}
"""

# With `publish = false`, release-plz can't compare against a crates.io
# version, which means its default flow leaves `registry_package_exists`
# at false and `should_update_version()` always returns false — no PR is
# ever opened. `git_only = true` switches to the git-tag-driven flow,
# which is the right mode for git-release-only projects.
#
# `git_tag_name` pins the tag pattern to `bougie-v<x.y.z>` regardless of
# how many packages release-plz currently considers — when every other
# crate is marked `release = false` (the default for everything except
# `bougie` itself), release-plz collapses into single-package mode and
# would otherwise default to the bare `v<x.y.z>` pattern that collides
# with the legacy `v0.4.0`-era tags.
[[package]]
name = "bougie"
git_only = true
git_tag_name = "bougie-v{{ version }}"

# Vendored helper crates — not released independently.
[[package]]
name = "sandbox-run"
release = false

[[package]]
name = "macos-sandbox-sys"
release = false

# Workspace-split helper crates introduced by the crates/* refactor.
# Only the `bougie` bin gets tagged; the leaf crates ride along inside
# the GitHub release artifacts.
