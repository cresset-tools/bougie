name: release-please

# Conventional-commit-driven release automation. On every push to main,
# release-please scans commits since the last `bougie-v*` tag and opens or
# updates a release PR that bumps `workspace.package.version` and prepends to
# `CHANGELOG.md`. Merging that PR makes release-please publish the
# `bougie-v<version>` GitHub Release (which creates the git tag), and the
# `release: published` event triggers `bougie-release.yml` (cargo-dist) to
# build the binary matrix and upload the artifacts onto that release.
#
# Unlike release-plz, release-please decides "what changed" purely from
# conventional-commit messages, not from per-crate file diffs. That means
# leaf-only changes (e.g. a `fix(composer): ...` that only edits
# `crates/bougie-composer-resolver/`) still drive a top-level release — which
# is why every workspace member is pinned in lockstep on
# `workspace.package.version`.
#
# Division of labour: release-please owns the WHOLE release — it creates the
# tag and publishes the GitHub Release itself (a real, non-draft release).
# dist owns nothing but the binaries: it runs with `create-release = false`
# and only uploads artifacts onto the release release-please already
# published (see dist-workspace.toml).
#
# Why release-please publishes a non-draft release (and dist no longer pushes
# the tag): a release PR merge and the next candidate-PR computation happen in
# a single release-please action step. If the just-released version isn't
# tagged by the time that step runs, release-please can't anchor its baseline,
# rescans all history, and proposes a spurious major bump (the 1.0.0 PRs we
# kept seeing). Publishing a non-draft release creates the tag *within* that
# same step — before the candidate PR is computed — so the baseline is always
# correct. A draft release would NOT create the tag (GitHub only creates it on
# publish), which is what forced the old push-tag job and PR-suppression
# hacks; publishing for real removes the need for both.
#
# Trade-off: for the few minutes between release-please publishing and dist
# finishing the build, the GitHub Release is public with notes but no
# binaries. Acceptable here (releases are infrequent; installs fall back to
# the mirror once artifacts land).

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

# Don't cancel in-flight runs — a half-written release PR is worse than
# waiting for the previous run to finish.
concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      # GitHub-App token (not `GITHUB_TOKEN`) so the release PR is authored by
      # an actor that *can* trigger downstream workflows — PRs opened with
      # `GITHUB_TOKEN` are silenced by GitHub's anti-recursion rule and
      # `ci.yml` would never run on them. The same applies to the release
      # publish: a `release: published` event from `GITHUB_TOKEN` wouldn't
      # trigger `bougie-release.yml`; minted via the app, it does.
      - name: Mint app token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}

      - name: release-please
        id: release
        uses: googleapis/release-please-action@v5
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      # release-please rewrites `workspace.package.version` but doesn't
      # understand Cargo.lock. Refresh the lockfile on the PR branch so CI
      # builds aren't broken by stale [[package]] entries. `--workspace`
      # scopes the update to workspace members only — external crates aren't
      # bumped. Don't pass `--offline`: a fresh runner has no cargo registry
      # cache, and cargo needs to fetch the index to verify the dep graph even
      # though no external dep versions actually move.
      - name: Checkout release PR
        if: ${{ steps.release.outputs.pr }}
        uses: actions/checkout@v6
        with:
          ref: ${{ fromJson(steps.release.outputs.pr).headBranchName }}
          token: ${{ steps.app-token.outputs.token }}

      - name: Refresh Cargo.lock
        if: ${{ steps.release.outputs.pr }}
        run: |
          cargo update --workspace
          if ! git diff --quiet Cargo.lock; then
            git config user.email "${{ vars.BOT_EMAIL || 'noreply@cresset.tools' }}"
            git config user.name "${{ vars.BOT_NAME || 'cresset-bot' }}"
            git add Cargo.lock
            git commit -m "chore(release): refresh Cargo.lock"
            git push
          fi
