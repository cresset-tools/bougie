name: release-please

# Conventional-commit-driven release automation. On every push to main,
# release-please scans commits since the last `bougie-v*` tag and
# opens or updates a release PR that bumps `workspace.package.version`
# and prepends to `CHANGELOG.md`. Merging the PR creates a *draft*
# GitHub Release; this workflow then pushes the `bougie-v<version>` tag,
# which triggers `bougie-release.yml` (cargo-dist) to build the binary
# matrix, upload the artifacts to that draft, and un-draft it.
#
# Unlike release-plz, release-please decides "what changed" purely from
# conventional-commit messages, not from per-crate file diffs. That
# means leaf-only changes (e.g. a `fix(composer): ...` that only edits
# `crates/bougie-composer-resolver/`) still drive a top-level release —
# which is why every workspace member is pinned in lockstep on
# `workspace.package.version`.
#
# release-please owns the GitHub Release (created as a draft — see
# `"draft": true` in release-please-config.json); dist runs with
# `create-release = false` and only attaches binaries + un-drafts.
# Letting release-please's normal publish job run in full also means it
# relabels merged release PRs from `autorelease: pending` to
# `autorelease: tagged` — without that the next run aborts with
# "untagged, merged release PRs outstanding".
#
# But a *draft* GitHub Release does NOT create its git tag (GitHub only
# creates the tag ref when a draft is published), so release-please
# never pushes `bougie-v<version>`. We push it ourselves in the "Push
# release tag" step below when a release was just created. That tag push
# is what triggers `bougie-release.yml` (dist) — which then attaches the
# binaries to the draft and un-drafts it. Without it the release stays a
# binary-less draft forever AND the next release-please run can't anchor
# its baseline (no tag), so it rescans all history and proposes a bogus
# major bump.

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

# Don't cancel in-flight runs — a half-written release PR is worse than
# waiting for the previous run to finish.
concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      # GitHub-App token (not `GITHUB_TOKEN`) so the release PR is
      # authored by an actor that *can* trigger downstream workflows —
      # PRs opened with `GITHUB_TOKEN` are silenced by GitHub's
      # anti-recursion rule and `ci.yml` would never run on them.
      - name: Mint app token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}

      - name: release-please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      # release-please rewrites `workspace.package.version` but doesn't
      # understand Cargo.lock. Refresh the lockfile on the PR branch so
      # CI builds aren't broken by stale [[package]] entries.
      # `--workspace` scopes the update to workspace members only —
      # external crates aren't bumped. Don't pass `--offline`: a fresh
      # runner has no cargo registry cache, and cargo needs to fetch
      # the index to verify the dep graph even though no external dep
      # versions actually move.
      - name: Checkout release PR
        if: ${{ steps.release.outputs.pr }}
        uses: actions/checkout@v5
        with:
          ref: ${{ fromJson(steps.release.outputs.pr).headBranchName }}
          token: ${{ steps.app-token.outputs.token }}

      - name: Refresh Cargo.lock
        if: ${{ steps.release.outputs.pr }}
        run: |
          cargo update --workspace
          if ! git diff --quiet Cargo.lock; then
            git config user.email "${{ vars.BOT_EMAIL || 'noreply@cresset.tools' }}"
            git config user.name "${{ vars.BOT_NAME || 'cresset-bot' }}"
            git add Cargo.lock
            git commit -m "chore(release): refresh Cargo.lock"
            git push
          fi

      # release-please created the draft Release but (because it's a
      # draft) not its git tag — push it ourselves so dist triggers and
      # un-drafts. `release_created` is set only on the run that publishes
      # a release (i.e. just after a release PR merged); `tag_name` is the
      # `bougie-v<version>` release-please assigned. `github.sha` is the
      # release commit (the merged release PR), matching the draft target.
      - name: Push release tag
        if: ${{ steps.release.outputs.release_created }}
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          TAG="${{ steps.release.outputs.tag_name }}"
          if git rev-parse --verify "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists; nothing to do."
            exit 0
          fi
          echo "Pushing $TAG @ ${{ github.sha }}"
          git config user.email "${{ vars.BOT_EMAIL || 'noreply@cresset.tools' }}"
          git config user.name "${{ vars.BOT_NAME || 'cresset-bot' }}"
          git tag -a "$TAG" -m "Release $TAG" "${{ github.sha }}"
          git push origin "$TAG"
