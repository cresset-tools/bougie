name: release-please

# Conventional-commit-driven release automation. On every push to main,
# release-please scans commits since the last `bougie-v*` tag and
# opens or updates a release PR that bumps `workspace.package.version`
# and prepends to `CHANGELOG.md`. Merging the PR pushes the
# `bougie-v<version>` tag, and `bougie-release.yml` (cargo-dist) picks
# up the tag push and builds the binary matrix + GitHub release.
#
# Unlike release-plz, release-please decides "what changed" purely from
# conventional-commit messages, not from per-crate file diffs. That
# means leaf-only changes (e.g. a `fix(composer): ...` that only edits
# `crates/bougie-composer-resolver/`) still drive a top-level release —
# which is why every workspace member is pinned in lockstep on
# `workspace.package.version`.
#
# `skip-github-release: true` tells release-please not to publish the
# GitHub Release itself; dist owns that step (it's the workflow with
# the built binaries to attach). release-please's release-publish step
# also pushes the tag, so we re-implement the tag push here from the
# merge commit.

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

# Don't cancel in-flight runs — a half-written release PR is worse than
# waiting for the previous run to finish.
concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      # GitHub-App token (not `GITHUB_TOKEN`) so the release PR is
      # authored by an actor that *can* trigger downstream workflows —
      # PRs opened with `GITHUB_TOKEN` are silenced by GitHub's
      # anti-recursion rule and `ci.yml` would never run on them.
      - name: Mint app token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}

      - name: release-please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          # Don't create the GitHub Release — dist owns that on the
          # `bougie-v*` tag push (see "Push release tag" below).
          # Otherwise dist's `gh release create` collides with
          # release-please's release and fails the bougie-release.yml
          # run after every release-PR merge.
          skip-github-release: true

      # release-please rewrites `workspace.package.version` but doesn't
      # understand Cargo.lock. Refresh the lockfile on the PR branch so
      # CI builds aren't broken by stale [[package]] entries.
      # `--workspace` scopes the update to workspace members only —
      # external crates aren't bumped. Don't pass `--offline`: a fresh
      # runner has no cargo registry cache, and cargo needs to fetch
      # the index to verify the dep graph even though no external dep
      # versions actually move.
      - name: Checkout release PR
        if: ${{ steps.release.outputs.pr }}
        uses: actions/checkout@v5
        with:
          ref: ${{ fromJson(steps.release.outputs.pr).headBranchName }}
          token: ${{ steps.app-token.outputs.token }}

      - name: Refresh Cargo.lock
        if: ${{ steps.release.outputs.pr }}
        run: |
          cargo update --workspace
          if ! git diff --quiet Cargo.lock; then
            git config user.email "${{ vars.BOT_EMAIL || 'noreply@cresset.tools' }}"
            git config user.name "${{ vars.BOT_NAME || 'cresset-bot' }}"
            git add Cargo.lock
            git commit -m "chore(release): refresh Cargo.lock"
            git push
          fi

      # With `skip-github-release: true`, release-please doesn't push
      # the tag either. Push it ourselves when a release PR just merged
      # — detected by "no PR was opened/updated this run, AND the
      # manifest version is ahead of the latest matching tag." dist's
      # tag-push trigger takes over from there.
      - name: Checkout main for tag detection
        if: ${{ ! steps.release.outputs.pr }}
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Push release tag
        if: ${{ ! steps.release.outputs.pr }}
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          VERSION=$(jq -r '."."' .release-please-manifest.json)
          TAG="bougie-v$VERSION"
          if git rev-parse --verify "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists; nothing to do."
            exit 0
          fi
          echo "Pushing $TAG @ ${{ github.sha }}"
          git config user.email "${{ vars.BOT_EMAIL || 'noreply@cresset.tools' }}"
          git config user.name "${{ vars.BOT_NAME || 'cresset-bot' }}"
          git tag -a "$TAG" -m "Release $TAG" "${{ github.sha }}"
          git push origin "$TAG"
