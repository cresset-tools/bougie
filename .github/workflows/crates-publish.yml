name: crates-publish

# Publish every workspace crate to crates.io in dependency order, on the same
# `release: published` event that release-please fires when it cuts a
# `bougie-v<version>` GitHub Release (and creates the tag). Runs alongside
# `bougie-release.yml` (cargo-dist binaries) — the two are independent: dist
# builds the user-facing binaries, this publishes the library crates so
# `cargo install bougie` works and the libs are consumable.
#
# Why cargo-workspaces and not a hand-rolled loop: crates.io accepts one crate
# at a time and dependents can't publish until their deps are live in the
# index. cargo-workspaces topologically orders the 28 crates, waits for each to
# appear in the index before publishing its dependents, and — crucially —
# SKIPS any crate whose current version is already on crates.io. That last
# property makes this job idempotent: if it dies halfway (flaky network, index
# lag), a re-run resumes where it left off — which is why the publish step
# below retries itself instead of leaving that re-run to a human.
#
# `--publish-as-is` publishes the versions exactly as committed at the tag.
# release-please already set `workspace.package.version` and the per-dep
# version pins (the `# x-release-please-version`-annotated lines in
# Cargo.toml); we do NOT bump/commit/tag here, only publish.

on:
  release:
    types: [published]

permissions:
  contents: read
  # Mint a short-lived OIDC token that crates.io exchanges for a temporary,
  # publish-scoped API token (Trusted Publishing). No long-lived secret.
  id-token: write

# Never cancel a publish mid-flight — a partially-published workspace is worse
# than waiting. (Re-running later is safe; already-published crates are skipped.)
concurrency:
  group: crates-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    # release-please only ever cuts `bougie-v*` releases, but be explicit so a
    # stray manual release can't trigger a publish.
    if: startsWith(github.event.release.tag_name, 'bougie-v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.release.tag_name }}
          persist-credentials: false

      # rust-toolchain.toml pins Rust 1.95 + rustfmt/clippy; rustup installs it
      # on the first cargo invocation in the repo dir. cargo-workspaces is
      # version-pinned for reproducible release behavior.
      - name: Install cargo-workspaces
        run: cargo install cargo-workspaces --version 0.4.2 --locked

      # Speeds up the per-crate `cargo publish` verification builds (each crate
      # is compiled to prove it packages cleanly before upload).
      - name: Cache build
        uses: Swatinem/rust-cache@v2

      # Exchange the workflow's OIDC identity for a temporary crates.io token
      # (valid ~30 min, scoped to the crates that trust this repo+workflow).
      # Every one of the 28 crates has a Trusted Publisher configured on
      # crates.io pointing at (cresset-tools/bougie, crates-publish.yml), so the
      # single minted token can publish them all. Replaces the old
      # CARGO_REGISTRY_TOKEN repo secret — no long-lived credential.
      - name: Authenticate to crates.io
        id: auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: Publish to crates.io
        env:
          # cargo reads CARGO_REGISTRY_TOKEN from the env automatically, so we
          # don't pass `--token` (which cargo now deprecates).
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        # --publish-as-is : publish committed versions, no bump/commit/tag.
        # --allow-branch '*' : the tag is checked out as detached HEAD, so the
        #   default `master`-only branch guard would otherwise reject it.
        # --publish-interval : give the index a moment between uploads to cut
        #   down on "dependency not yet available" retries.
        # --yes : non-interactive.
        #
        # The retry loop: after uploading a crate, stable cargo waits at most
        # 60s (hard-coded — `publish.timeout` is still nightly-only,
        # rust-lang/cargo#11222) for it to appear in the index. When crates.io
        # propagation lags past that, packaging the next dependent crate can't
        # resolve the just-published dep and the whole topological publish
        # aborts (#390, #398, #424 — it hit about every other release, each
        # time fixed by a manual re-run). A stuck attempt fails fast at the
        # blocking crate, so failed attempts are cheap; the sleeps buy the
        # index up to ~10 extra minutes to catch up. Kept well under the ~30
        # min validity of the Trusted Publishing token minted above — and if
        # that ever expires mid-retry, the job fails red and a manual re-run
        # (fresh token) still works, same as before.
        run: |
          attempts=5
          for attempt in $(seq 1 "$attempts"); do
            if [ "$attempt" -gt 1 ]; then
              echo "::warning::cargo ws publish attempt $((attempt - 1)) failed (crates.io index propagation lag?); retrying in 120s (attempt ${attempt}/${attempts})"
              sleep 120
            fi
            if cargo ws publish \
              --publish-as-is \
              --allow-branch '*' \
              --publish-interval 15 \
              --yes; then
              exit 0
            fi
          done
          echo "::error::cargo ws publish still failing after ${attempts} attempts"
          exit 1
