name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel an in-flight run when the same ref gets a newer push.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: cargo test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            build_cmd: cargo build --all-targets --features test-fixtures
            test_cmd: cargo test --features test-fixtures
          - os: macos-latest
            build_cmd: cargo build --all-targets --features test-fixtures
            test_cmd: cargo test --features test-fixtures
          # Windows runs lib unit tests + the dedicated windows_smoke
          # integration test. The other integration tests pull in
          # Unix-only fixtures (mariadb/opensearch/rabbitmq tarball
          # tables, `pre_exec`, `PermissionsExt::set_mode`, …) — they
          # are deliberately not built here. `cargo build -p bougie`
          # (without --all-targets) keeps the binary green; the
          # lib+smoke test commands cover everything Windows is
          # supposed to cover. The `-p bougie` selector is required
          # since the workspace also contains `sandbox-run`, which is
          # deliberately Unix-only and `compile_error!`s under a plain
          # `cargo build` on Windows.
          # The `test-fixtures` feature gates the fake-redis bin, which
          # is Unix-only test infrastructure — skip it on Windows.
          - os: windows-latest
            build_cmd: cargo build -p bougie
            test_cmd: cargo test -p bougie --lib --test windows_smoke
    steps:
      # No `lfs: true`: the only LFS-tracked blobs were the cross-check
      # corpus fixtures, which this matrix never reads (the corpus tests
      # are gated behind the `cross-check-fixtures` feature, enabled only
      # in the dedicated `cross-check` job below, which fetches the blobs
      # on demand).
      - uses: actions/checkout@v6

      # macos-latest runners no longer ship a usable cargo on PATH, so
      # install the toolchain explicitly. rust-toolchain.toml pins the
      # channel + components and is read by this action.
      #
      # `cache-bin: false` is the workaround for a recurring macOS
      # failure where the runner's `~/.cargo/bin/cargo` got cached
      # as the rustup-init multiplexer rather than the cargo proxy.
      # Subsequent restores broke with "error: unexpected argument
      # 'build' found" because rustup-init doesn't speak cargo
      # subcommands. The action's bin cache only saves ~5–10s; the
      # toolchain itself is still cached by Swatinem/rust-cache.
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache-bin: false

      - uses: Swatinem/rust-cache@v2

      - name: cargo build
        run: ${{ matrix.build_cmd }}

      - name: cargo test
        run: ${{ matrix.test_cmd }}

  # The cross-check corpus suite validates that bougie's resolver produces
  # the same package set as Composer 2.8.12 against frozen Packagist
  # metadata. It is gated behind the `cross-check-fixtures` feature and
  # needs the multi-MB metadata blobs, which are fetched on demand (no
  # longer committed via LFS). Kept in its own Linux-only job so the
  # download doesn't slow the build matrix.
  cross-check:
    name: composer cross-check corpus
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache-bin: false

      - uses: Swatinem/rust-cache@v2

      # Cache the fetched blobs keyed on the checksum manifest so a green
      # run reuses them instead of re-downloading the ~56 MB tarball. The
      # fetch script is idempotent: on a cache hit it verifies and skips.
      - name: Cache cross-check fixtures
        uses: actions/cache@v5
        with:
          path: crates/bougie/tests/fixtures/cross-check/**/packagist-index.json.zst
          key: cross-check-fixtures-${{ hashFiles('crates/bougie/tests/fixtures/cross-check/fixtures.sha256') }}

      - name: Fetch cross-check fixtures
        run: scripts/fetch-cross-check-fixtures.sh

      - name: Run cross-check corpus
        run: cargo test -p bougie --test composer_cross_check --features cross-check-fixtures
