name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel an in-flight run when the same ref gets a newer push.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: cargo test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v5

      # macos-latest runners no longer ship a usable cargo on PATH, so
      # install the toolchain explicitly. rust-toolchain.toml pins the
      # channel + components and is read by this action.
      #
      # `cache-bin: false` is the workaround for a recurring macOS
      # failure where the runner's `~/.cargo/bin/cargo` got cached
      # as the rustup-init multiplexer rather than the cargo proxy.
      # Subsequent restores broke with "error: unexpected argument
      # 'build' found" because rustup-init doesn't speak cargo
      # subcommands. The action's bin cache only saves ~5–10s; the
      # toolchain itself is still cached by Swatinem/rust-cache.
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache-bin: false

      - uses: Swatinem/rust-cache@v2

      - name: cargo build
        run: cargo build --all-targets --features test-fixtures

      - name: cargo test
        run: cargo test --features test-fixtures
