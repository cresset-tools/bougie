name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel an in-flight run when the same ref gets a newer push.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: cargo test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v5

      # rust-toolchain.toml pins the channel + components; rustup obeys it
      # on first cargo invocation.

      - uses: Swatinem/rust-cache@v2

      - name: cargo build
        run: cargo build --all-targets

      - name: cargo test
        run: cargo test
