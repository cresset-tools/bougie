name: build-docker

# Builds and publishes bougie's container images on GitHub-hosted runners.
#
# Two entry points:
#
#   * workflow_call (release): bougie-release.yml invokes this as a
#     post-announce job once release-please has published the
#     `bougie-v<version>` GitHub Release. Wired in via `post-announce-jobs`
#     in dist-workspace.toml, same mechanism as publish-mirror.yml. Pushes
#     versioned + rolling tags to GHCR.
#
#   * pull_request: a push-free smoke build of the base image (amd64 only)
#     whenever the Dockerfiles or the cargo sources change, so a broken
#     image build is caught on the PR rather than at release time.
#
# Images (GHCR only for now — matches the mirror-first release philosophy;
# Docker Hub can be added later as a second login + push target):
#
#   ghcr.io/cresset-tools/bougie              scratch, binary-only:
#       COPY --from=ghcr.io/cresset-tools/bougie:latest /bougie /bgx /usr/local/bin/
#   ghcr.io/cresset-tools/bougie:<v>-debian-slim   runnable, debian:trixie-slim
#   ghcr.io/cresset-tools/bougie:<v>-alpine        runnable, alpine:3.22
#
# Multi-arch strategy: each architecture builds natively on its own
# GitHub-hosted runner — amd64 on `ubuntu-latest`, arm64 on the free
# `ubuntu-24.04-arm` runner (this repo is public, so arm runners cost
# nothing). No QEMU, no cross-compile. Each per-arch leg pushes an
# untagged image *by digest*; a follow-up merge job assembles the
# per-arch digests into one multi-arch manifest with `buildx imagetools
# create` and applies the release tags. The base image
# (docker/Dockerfile) compiles natively on each arch; the variant images
# (docker/Dockerfile.extra) are tiny `COPY --from` overlays. Layer cache
# is the GitHub Actions cache (`type=gha`), scoped per arch so the two
# legs don't clobber each other.
#
# Attestation: per-arch builds set `provenance: false` so `push-by-digest`
# yields clean single-arch image digests (deterministic for the merge);
# provenance is attested once, on the final multi-arch index, via
# actions/attest-build-provenance (push-to-registry), which is the
# authoritative, GitHub-visible attestation.

on:
  workflow_call:
    inputs:
      plan:
        description: "dist plan JSON; its presence selects the release path."
        required: false
        default: ""
        type: string
  pull_request:
    paths:
      - "docker/**"
      - "crates/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - ".github/workflows/build-docker.yml"

permissions: {}

env:
  # github.repository is already lowercase for this repo; GHCR requires it.
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  # PR smoke test: prove the base image still builds. amd64 only (the arm64
  # leg is the same native build, just on an arm64 runner) and never pushed.
  pr-smoke:
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: docker/setup-buildx-action@v4
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64
          push: false
          cache-from: type=gha,scope=base-linux-amd64
          cache-to: type=gha,mode=max,scope=base-linux-amd64

  # Release: build the scratch base image natively per-arch and push each
  # leg to GHCR by digest (untagged). The `base` merge job assembles them.
  base-build:
    if: ${{ inputs.plan != '' }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - { arch: linux/amd64, runner: ubuntu-latest }
          - { arch: linux/arm64, runner: ubuntu-24.04-arm }
    runs-on: ${{ matrix.platform.runner }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Platform pair
        run: |
          platform='${{ matrix.platform.arch }}'
          echo "PLATFORM_PAIR=${platform//\//-}" >> "$GITHUB_ENV"

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile
          platforms: ${{ matrix.platform.arch }}
          tags: ${{ env.IMAGE }}
          # Clean single-arch image digests for a deterministic merge;
          # provenance is attested on the final index in the `base` job.
          provenance: false
          outputs: type=image,push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=base-${{ env.PLATFORM_PAIR }}
          cache-to: type=gha,mode=max,scope=base-${{ env.PLATFORM_PAIR }}

      - name: Export digest
        run: |
          mkdir -p "${{ runner.temp }}/digests"
          digest='${{ steps.build.outputs.digest }}'
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digests-base-${{ env.PLATFORM_PAIR }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  # Release: merge the per-arch base digests into one multi-arch manifest,
  # tag it, and attest the final index.
  base:
    needs: base-build
    if: ${{ inputs.plan != '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write # attestations
      attestations: write
    outputs:
      version: ${{ steps.ver.outputs.version }}
      major_minor: ${{ steps.ver.outputs.major_minor }}
      is_prerelease: ${{ steps.ver.outputs.is_prerelease }}
      digest: ${{ steps.digest.outputs.digest }}
    steps:
      - name: Derive version from dist plan
        id: ver
        # announcement_tag is `bougie-v<version>`; strip the namespace to get
        # the bare semver used for image tags. major.minor + latest are only
        # meaningful for stable releases, so gate them on the prerelease flag.
        run: |
          set -euo pipefail
          tag='${{ fromJson(inputs.plan).announcement_tag }}'
          version="${tag#bougie-v}"
          prerelease='${{ fromJson(inputs.plan).announcement_is_prerelease }}'
          {
            echo "version=${version}"
            echo "major_minor=${version%.*}"
            echo "is_prerelease=${prerelease}"
          } >> "$GITHUB_OUTPUT"

      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-base-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tags + labels
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE }}
          flavor: latest=false
          tags: |
            type=raw,value=${{ steps.ver.outputs.version }}
            type=raw,value=${{ steps.ver.outputs.major_minor }},enable=${{ steps.ver.outputs.is_prerelease == 'false' }}
            type=raw,value=latest,enable=${{ steps.ver.outputs.is_prerelease == 'false' }}

      - name: Create multi-arch manifest and push
        working-directory: ${{ runner.temp }}/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.IMAGE }}@sha256:%s ' *)

      - name: Record final digest
        id: digest
        run: |
          set -euo pipefail
          digest=$(docker buildx imagetools inspect \
            "${{ env.IMAGE }}:${{ steps.ver.outputs.version }}" \
            --format '{{.Manifest.Digest}}')
          echo "digest=${digest}" >> "$GITHUB_OUTPUT"

      - name: Attest base image provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ${{ env.IMAGE }}
          subject-digest: ${{ steps.digest.outputs.digest }}
          push-to-registry: true

  # Release: overlay the just-pushed base binaries onto runnable OS bases,
  # natively per-arch. Pinned to the base image by its multi-arch index
  # digest so each arch leg pulls the matching sub-image, and a variant
  # always matches the base it was cut from. Pushed by digest for the merge.
  extra-build:
    needs: base
    if: ${{ inputs.plan != '' }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - { arch: linux/amd64, runner: ubuntu-latest }
          - { arch: linux/arm64, runner: ubuntu-24.04-arm }
        suffix:
          - name: debian-slim
            base_image: debian:trixie-slim
            certs_install: "apt-get update && apt-get install -y --no-install-recommends ca-certificates && rm -rf /var/lib/apt/lists/*"
          - name: alpine
            base_image: alpine:3.22
            certs_install: "apk add --no-cache ca-certificates"
    runs-on: ${{ matrix.platform.runner }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Platform pair
        run: |
          platform='${{ matrix.platform.arch }}'
          echo "PLATFORM_PAIR=${platform//\//-}" >> "$GITHUB_ENV"

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.suffix.name }} by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile.extra
          platforms: ${{ matrix.platform.arch }}
          provenance: false
          build-args: |
            BASE_IMAGE=${{ matrix.suffix.base_image }}
            BOUGIE_IMAGE=${{ env.IMAGE }}@${{ needs.base.outputs.digest }}
            CERTS_INSTALL=${{ matrix.suffix.certs_install }}
          tags: ${{ env.IMAGE }}
          outputs: type=image,push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=extra-${{ matrix.suffix.name }}-${{ env.PLATFORM_PAIR }}
          cache-to: type=gha,mode=max,scope=extra-${{ matrix.suffix.name }}-${{ env.PLATFORM_PAIR }}

      - name: Export digest
        run: |
          mkdir -p "${{ runner.temp }}/digests"
          digest='${{ steps.build.outputs.digest }}'
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digests-extra-${{ matrix.suffix.name }}-${{ env.PLATFORM_PAIR }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  # Release: merge each variant's per-arch digests into a multi-arch
  # manifest, tag it, and attest the final index.
  extra:
    needs: [base, extra-build]
    if: ${{ inputs.plan != '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write # attestations
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        suffix: [debian-slim, alpine]
    steps:
      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-extra-${{ matrix.suffix }}-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tags + labels
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE }}
          flavor: latest=false
          tags: |
            type=raw,value=${{ needs.base.outputs.version }}-${{ matrix.suffix }}
            type=raw,value=${{ needs.base.outputs.major_minor }}-${{ matrix.suffix }},enable=${{ needs.base.outputs.is_prerelease == 'false' }}
            type=raw,value=${{ matrix.suffix }},enable=${{ needs.base.outputs.is_prerelease == 'false' }}

      - name: Create multi-arch manifest and push
        working-directory: ${{ runner.temp }}/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.IMAGE }}@sha256:%s ' *)

      - name: Record final digest
        id: digest
        run: |
          set -euo pipefail
          digest=$(docker buildx imagetools inspect \
            "${{ env.IMAGE }}:${{ needs.base.outputs.version }}-${{ matrix.suffix }}" \
            --format '{{.Manifest.Digest}}')
          echo "digest=${digest}" >> "$GITHUB_OUTPUT"

      - name: Attest ${{ matrix.suffix }} variant provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ${{ env.IMAGE }}
          subject-digest: ${{ steps.digest.outputs.digest }}
          push-to-registry: true
