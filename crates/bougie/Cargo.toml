[package]
name = "bougie"
version.workspace = true
edition = "2024"
description = "PHP toolchain management the luxury way."
license = "EUPL-1.2"
repository = "https://github.com/cresset-tools/bougie"
rust-version = "1.95"
default-run = "bougie"
authors.workspace = true

[[bin]]
name = "bougie"
path = "src/main.rs"

# Phase 3 integration-test fixture. Stands in for a real redis-server
# in the supervisor tests: parses `--unixsocket <path>` and binds the
# socket, satisfying the daemon's health probe. Gated behind the
# non-default `test-fixtures` feature so `cargo install --path .` skips
# it; CI and local `cargo test` enable the feature explicitly.
[[bin]]
name = "fake-redis"
path = "tests/fixtures/fake_redis.rs"
required-features = ["test-fixtures"]

[features]
default = ["dev-trust-root"]
# Enables the `fake-redis` test-fixture bin. Off by default so
# `cargo install` doesn't ship it; turn on with `cargo test --features
# test-fixtures` (CI does this).
test-fixtures = []
# Enables the Layer 4 cross-check integration tests that load
# pre-captured Packagist fixtures from
# `tests/fixtures/cross-check/<slug>/`. Off by default so the
# compressed fixture bytes don't inflate `cargo build`. Run with:
#   cargo test -p bougie --test composer_cross_check --features cross-check-fixtures
cross-check-fixtures = []
# Forwards through to `bougie-index/dev-trust-root` — see that crate
# for what the override allows. A `cargo install --no-default-features`
# (or a release pipeline that does the same) ships a binary where the
# env var is inert.
dev-trust-root = ["bougie-index/dev-trust-root"]

# --- Workspace crates ---

[dependencies]
bougie-backend = { workspace = true }
bougie-autoloader = { workspace = true }
bougie-cli = { workspace = true }
bougie-composer = { workspace = true }
bougie-composer-resolver = { workspace = true }
bougie-config = { workspace = true }
bougie-errors = { workspace = true }
bougie-fetch = { workspace = true }
bougie-fs = { workspace = true }
bougie-index = { path = "../bougie-index", version = "0.6.0", default-features = false }
bougie-installer = { workspace = true }
bougie-output = { workspace = true }
bougie-paths = { workspace = true }
bougie-platform = { workspace = true }
bougie-resolver = { workspace = true }
bougie-server = { workspace = true }
bougie-version = { workspace = true }
bougie-semver = { workspace = true }
spdx = "0.10"

# `bougied` (process supervisor) and the recipe engine rely on Unix-only
# APIs (domain sockets, POSIX signals, sandbox-run's Landlock/SBPL
# backends, utimensat, /bin/sh). Gating the deps means Windows builds
# skip the crates entirely. `bougie-server` is now cross-platform
# (Windows replaces php-fpm with `php-cgi.exe -b 127.0.0.1:<port>` and
# uses named pipes for the control endpoint) and stays in the regular
# [dependencies] block above.
[target.'cfg(unix)'.dependencies]
bougie-babysit = { workspace = true }
bougie-daemon = { workspace = true }
bougie-recipe = { workspace = true }
sandbox-run = { workspace = true }

# --- External deps still used directly by the bin (CLI dispatch,
#     commands/ handlers, the unzip-shim role, etc.) ---

[dependencies.clap]
version = "4.5"
default-features = false
features = ["std", "derive", "help", "usage", "error-context", "suggestions", "wrap_help", "color"]

[dependencies.color-eyre]
version = "0.6"

[dependencies.eyre]
version = "0.6"

[dependencies.reqwest]
version = "0.13"
default-features = false
features = ["blocking", "rustls", "stream"]

[dependencies.serde]
version = "1.0"
features = ["derive"]

[dependencies.serde_json]
version = "1.0"
features = ["preserve_order"]

[dependencies.tempfile]
version = "3.10"

[dependencies.toml_edit]
version = "0.25"
features = ["serde"]

# Opt-in diagnostic logging. The binary installs a `tracing-subscriber`
# in `main` that's inert unless `BOUGIE_LOG` (or `RUST_LOG`) is set —
# zero-overhead for normal users, full visibility when the user wants
# to investigate timing or hangs (e.g. `BOUGIE_LOG=bougie_composer_resolver=debug`).
[dependencies.tracing]
version = "0.1"

[dependencies.tracing-subscriber]
version = "0.3"
default-features = false
features = ["env-filter", "fmt", "std"]

[dependencies.walkdir]
version = "2.5"

# In-process `unzip` shim — Composer's ZipDownloader prefers a PATH
# `unzip` over PHP's ZipArchive (faster + preserves Unix mode bits and
# symlinks). We satisfy that preference by exposing `unzip` as an
# argv[0] role on the bougie binary, implemented against this crate.
[dependencies.zip]
version = "8.0"
default-features = false
features = ["deflate"]

[dev-dependencies]
assert_cmd = "2.0"        # spawn the bougie binary in integration tests
predicates = "3.1"        # human-readable assertions on its output
insta = "1.41"            # snapshot tests for `--format json` schemas
wiremock = "0.6"          # fake index server for end-to-end tests
tempfile = "3.10"
serde_json = "1.0"
base64 = "0.22"           # encode test signatures
tokio = { version = "1", features = ["rt", "macros"] }  # drive wiremock
zip = { version = "8.0", default-features = false, features = ["deflate"] }
reqwest = { version = "0.13", default-features = false, features = ["blocking", "rustls"] }
# Crates only used by integration tests in tests/; kept out of the
# regular [dependencies] block so a bin-only build doesn't link them.
sha1 = "0.10"
sha2 = "0.11"
sigstore = { version = "0.13", default-features = false, features = ["cosign", "verify", "rustls-tls", "sigstore-trust-root"] }
zstd = { version = "0.13", default-features = false }
tar = "0.4"
rustix = { version = "1.0", default-features = false, features = ["std", "fs", "process"] }
bougie-index = { path = "../bougie-index", version = "0.6.0" }
bougie-composer = { workspace = true }

[lints]
workspace = true
