[package]
name = "sandbox-run"
version.workspace = true
description = "Cross-platform process sandboxing (Linux Landlock, macOS SBPL) via pre_exec"
edition.workspace = true
license.workspace = true
authors.workspace = true

[dependencies]
libc = "0.2"

[target.'cfg(target_os = "macos")'.dependencies]
macos-sandbox-sys = { workspace = true }

[target.'cfg(target_os = "linux")'.dependencies]
landlock = "0.4"
