# Builtin Magento recipe. Mirrors RECIPES.md §6.
#
# Assumes `server` is declared in the project (via `bougie service
# add server` or `extra.bougie.services.server`); otherwise `bougie
# service up server` errors per SERVICES.md §3.2.

[task.services]
# `server` is added *and* up'd here so the recipe is self-contained
# AND the server tenant is provisioned by the time [task.install]
# runs — Magento's `setup:install --base-url=http://...` writes the
# URL into `app/etc/env.php` at install time, and the URL is built
# from `$BOUGIE_SERVICE_SERVER_HOSTNAME`/`$BOUGIE_SERVICE_SERVER_PORT`
# which only get populated once the server's tenant has been
# allocated by the `up` path. Starting the listener this early is
# harmless — Magento isn't installed yet, but nothing makes HTTP
# requests until [task.start] anyway, and `bougie service up server` is
# idempotent so re-running it there is a no-op.
#
# rabbitmq is conditional on the Amqp *module* being on disk. Magento's
# ConfigOptionsListCollector registers `setup:install`'s `--amqp-*`
# options per module component found on disk, and additive / modular
# Mage-OS builds (modulargento) can omit `<vendor>/module-amqp`
# entirely (the `framework-amqp` library may remain — only the module
# wires the CLI options and consumers). On such a tree the flags would
# be rejected as unknown options, and a broker nothing can talk to is
# pure overhead, so both this task and the `--amqp-*` wiring in
# [task.install] key off the same directory probe. The `vendor` dep
# guarantees the tree is synced before the probe runs;
# `app/code/Magento/Amqp` covers the magento/magento2 monorepo, whose
# core modules live in-tree rather than under `vendor/`.
deps = ["vendor"]
run = """
bougie service add mariadb redis opensearch server
bougie service up --detach mariadb redis opensearch server
amqp=no
for d in vendor/*/module-amqp app/code/Magento/Amqp; do
  if [ -d "$d" ]; then amqp=yes; fi
done
if [ "$amqp" = yes ]; then
  bougie service add rabbitmq
  bougie service up --detach rabbitmq
fi
"""

[task.vendor]
# Gate on `vendor/autoload.php` rather than `vendor/` itself: the
# Magento 2 monorepo commits an empty `vendor/.htaccess` so the bare
# directory exists pre-install. `autoload.php` is the canonical
# "vendor has been installed" marker.
creates = "vendor/autoload.php"
deps = ["composer.lock", "composer.json"]
run = "bougie sync"

[task.install]
deps = ["vendor", "services"]
# `setup:install` is one-shot: once `app/etc/env.php` exists, Magento is
# installed and re-running it does nothing useful (and risks clobbering).
# Gate on env.php *existence* via `check`, not a `creates` mtime — the
# mtime form re-ran the install whenever `vendor/` ended up newer (or the
# phony `services` dep ran). The deps still run first (services come up,
# vendor is ensured); only the install step itself is skipped when already
# installed.
check = "test -f app/etc/env.php"
# Redis is wired in two steps. bougie's redis is socket-only, but
# Mage-OS 3.0.0's `--cache-backend=redis` shorthand routes through an
# optimized Symfony/Predis adapter (framework/.../SymfonyAdapterProvider)
# that hardcodes `scheme => tcp`, so a socket server mis-parses as
# `tcp:///path` and "Enabling caches" fails. The CLI won't accept a custom
# backend class either. So: install with the default file cache, then
# rewrite env.php's cache to the classic Credis backend
# (Magento\Framework\Cache\Backend\Redis), which speaks the unix socket.
# rabbitmq below is TCP, so the amqp wiring stays inline — but only when
# the Amqp module is on disk (same probe as [task.services]; without the
# module, `setup:install` rejects `--amqp-*` as unknown options) AND the
# rabbitmq tenant env is actually populated (the service can be absent
# even with the module present, e.g. a first `bougie make install`
# without the services task). The flags are staged into the positional
# params (`set --`) — POSIX sh's only array — so an empty set expands
# to zero words in `"$@"`.
#
# Team mode: if a production database snapshot is configured for this project,
# seed the local DB from it instead of a fresh `setup:install`. `bougie db pull
# --if-configured` exits 3 when nothing is configured (not a team project, or no
# dump set up) — the signal to fall through to a fresh install below. A real
# pull failure (auth / network / 404) is a HARD error: we must not clobber a
# would-be team database with a throwaway fresh install on a transient hiccup.
run = """
rc=0
bougie db pull --if-configured || rc=$?
case "$rc" in
  0)
    # Load the production-shaped dump (one-shot; `bougie db seed` records a
    # marker so it won't reload on the next start).
    bougie db seed
    # The dump carries production's database, but app/etc/env.php is a gitignored
    # local file it can't provide — write one wired to THIS machine's services.
    # A fresh crypt key means production-encrypted config values (payment creds,
    # etc.) won't decrypt locally; that's expected for dev and stops neither
    # Magento nor admin login from working.
    echo | bougie run -- php <<'PHP'
<?php
$redis = [
    'server' => getenv('BOUGIE_SERVICE_REDIS_SOCKET'),
    'port' => '0',
    'database' => getenv('BOUGIE_SERVICE_REDIS_DB'),
    'id_prefix' => 'bgc_',
];
$cache = ['backend' => 'Magento\\Framework\\Cache\\Backend\\Redis', 'backend_options' => $redis];
$env = [
    'backend' => ['frontName' => 'admin'],
    'crypt' => ['key' => bin2hex(random_bytes(16))],
    'db' => [
        'table_prefix' => '',
        'connection' => [
            'default' => [
                'host' => getenv('BOUGIE_SERVICE_MARIADB_SOCKET'),
                'dbname' => getenv('BOUGIE_SERVICE_MARIADB_DATABASE'),
                'username' => getenv('BOUGIE_SERVICE_MARIADB_USER'),
                'password' => getenv('BOUGIE_SERVICE_MARIADB_PASSWORD'),
                'active' => '1',
            ],
        ],
    ],
    'resource' => ['default_setup' => ['connection' => 'default']],
    'x-frame-options' => 'SAMEORIGIN',
    'MAGE_MODE' => 'developer',
    'session' => ['save' => 'files'],
    'lock' => ['provider' => 'db'],
    'cache' => ['frontend' => ['default' => $cache, 'page_cache' => $cache]],
    'install' => ['date' => date('r')],
];
file_put_contents('app/etc/env.php', '<?php' . PHP_EOL . 'return ' . var_export($env, true) . ';' . PHP_EOL);
PHP
    # The dump has production's base_url; point the store at the local dev server
    # (locked into env.php so it can't be changed from the seeded admin config).
    base="http://${BOUGIE_SERVICE_SERVER_HOSTNAME}:${BOUGIE_SERVICE_SERVER_PORT}/"
    bougie run -- bin/magento config:set --lock-env web/unsecure/base_url "$base"
    bougie run -- bin/magento config:set --lock-env web/secure/base_url "$base"
    bougie run -- bin/magento deploy:mode:set developer
    exit 0
    ;;
  3)
    : # nothing configured — fall through to a fresh setup:install
    ;;
  *)
    echo "bougie: pulling the team database snapshot failed (exit $rc); refusing to fall back to a fresh install" >&2
    exit "$rc"
    ;;
esac

# Fresh install (no team snapshot configured):
amqp=no
for d in vendor/*/module-amqp app/code/Magento/Amqp; do
  if [ -d "$d" ]; then amqp=yes; fi
done
set --
if [ "$amqp" = yes ] && [ -n "$BOUGIE_SERVICE_RABBITMQ_HOST" ]; then
  set -- \
    --amqp-host="$BOUGIE_SERVICE_RABBITMQ_HOST" \
    --amqp-port="$BOUGIE_SERVICE_RABBITMQ_PORT" \
    --amqp-user="$BOUGIE_SERVICE_RABBITMQ_USER" \
    --amqp-password="$BOUGIE_SERVICE_RABBITMQ_PASSWORD" \
    --amqp-virtualhost="$BOUGIE_SERVICE_RABBITMQ_VHOST"
fi
bougie run -- php -d memory_limit=4G bin/magento setup:install \
  --base-url="http://${BOUGIE_SERVICE_SERVER_HOSTNAME}:${BOUGIE_SERVICE_SERVER_PORT}/" \
  --db-host="$BOUGIE_SERVICE_MARIADB_SOCKET" \
  --db-name="$BOUGIE_SERVICE_MARIADB_DATABASE" \
  --db-user="$BOUGIE_SERVICE_MARIADB_USER" \
  --db-password="$BOUGIE_SERVICE_MARIADB_PASSWORD" \
  --search-engine=opensearch \
  --opensearch-host="$BOUGIE_SERVICE_OPENSEARCH_HOST" \
  --opensearch-port="$BOUGIE_SERVICE_OPENSEARCH_PORT" \
  "$@" \
  --admin-firstname=Admin --admin-lastname=Admin \
  --admin-email=admin@example.com --admin-user=admin \
  --admin-password=admin123 --language=en_US --currency=USD \
  --timezone=UTC --use-rewrites=1
echo | bougie run -- php <<'PHP'
<?php
$f = 'app/etc/env.php';
$c = require $f;
$o = ['server' => getenv('BOUGIE_SERVICE_REDIS_SOCKET'), 'port' => '0', 'database' => getenv('BOUGIE_SERVICE_REDIS_DB')];
foreach (['default', 'page_cache'] as $k) {
    $c['cache']['frontend'][$k] = ['id_prefix' => 'bgc_', 'backend' => 'Magento\\Framework\\Cache\\Backend\\Redis', 'backend_options' => $o];
}
file_put_contents($f, '<?php' . PHP_EOL . 'return ' . var_export($c, true) . ';' . PHP_EOL);
PHP
bougie run -- bin/magento deploy:mode:set developer
"""

[task.localdev]
deps = ["install"]
# Local-dev conveniences applied once after install:
#   - Disable Magento's mandatory admin 2FA. 2.4.x ships 2FA enabled with
#     no store-config toggle, so it has to be turned off at the module
#     level. We deliberately DON'T use `bin/magento module:disable`: that
#     writes the change into the *tracked* `app/etc/config.php`, leaving a
#     dirty file that `git add .` would commit (and ship 2FA-off to every
#     other env). Instead we override the module flags in `app/etc/env.php`
#     — gitignored, and already rewritten by [task.install] for Redis.
#     Magento merges env.php over config.php (env.php wins), so the modules
#     read as disabled with nothing to commit. Only modules actually listed
#     in config.php are flipped, so it's a no-op on builds without the Adobe
#     IMS 2FA module (`Magento_AdminAdobeImsTwoFactorAuth`, 2.4.6+ only).
#   - Put every indexer in realtime ("Update on Save") mode so saving a
#     product/category reindexes immediately — no cron or consumer needed.
#     Indexer mode lives in the database, so this doesn't touch git either.
# Gate on env.php first (the rewrite + bin/magento can't run pre-install).
# Idempotent: env.php flags are re-applied each run, and the check clears
# once 2FA reads disabled and no indexer is left in schedule mode.
check = """
test -f app/etc/env.php || exit 1
bougie run -- bin/magento indexer:show-mode --no-ansi 2>/dev/null | grep -q 'Update by Schedule' && exit 1
bougie run -- bin/magento module:status Magento_TwoFactorAuth --no-ansi 2>/dev/null | grep -qi disabled
"""
run = """
echo | bougie run -- php <<'PHP'
<?php
$cfg = is_file('app/etc/config.php') ? require 'app/etc/config.php' : ['modules' => []];
$envFile = 'app/etc/env.php';
$env = require $envFile;
foreach (['Magento_TwoFactorAuth', 'Magento_AdminAdobeImsTwoFactorAuth'] as $m) {
    if (!empty($cfg['modules']) && array_key_exists($m, $cfg['modules'])) {
        $env['modules'][$m] = 0;
    }
}
file_put_contents($envFile, '<?php' . PHP_EOL . 'return ' . var_export($env, true) . ';' . PHP_EOL);
PHP
bougie run -- bin/magento indexer:set-mode realtime
bougie run -- bin/magento indexer:reindex
bougie run -- bin/magento cache:flush
"""

[task.reindex]
deps = ["localdev"]
# Pre-gate on `app/etc/env.php`: bin/magento exits 0 with no stdout
# when it can't reach the DB, which makes `grep -qv` falsely pass.
check = """
test -f app/etc/env.php || exit 1
bougie run -- bin/magento indexer:status --no-ansi | grep -qv 'invalid\\|reindex required'
"""
run = "bougie run -- bin/magento indexer:reindex"

[task.start]
deps = ["reindex"]
run = "bougie service up --detach server"
