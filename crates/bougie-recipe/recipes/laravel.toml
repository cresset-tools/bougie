# Builtin Laravel recipe.

[task.services]
# `server` is declared here alongside the backing services so the
# recipe is self-contained — `bougie service up server` errors on an
# undeclared name per SERVICES.md §3.2, and an installer-scaffolded
# project (`bougie new --starter laravel`) declares nothing. Same
# pattern as the Magento recipe.
run = """
bougie service add mariadb redis server
bougie service up --detach mariadb redis server
"""

[task.vendor]
creates = "vendor"
deps = ["composer.lock", "composer.json"]
run = "bougie sync"

[task.env]
creates = ".env"
deps = [".env.example"]
run = """
cp .env.example .env
bougie run -- php artisan key:generate
"""

[task.migrate]
deps = ["vendor", "services", "env"]
check = "bougie run -- php artisan migrate:status >/dev/null 2>&1"
run = "bougie run -- php artisan migrate --force"

[task.start]
deps = ["migrate"]
run = "bougie service up --detach server"
