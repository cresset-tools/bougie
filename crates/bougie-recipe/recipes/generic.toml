# Builtin recipe for generic / unknown PHP projects. Just installs
# vendor and brings up the project's declared server (if any).

[task.vendor]
creates = "vendor"
deps = ["composer.lock", "composer.json"]
run = "bougie sync"

[task.start]
deps = ["vendor"]
# No explicit names: `bougie service up server` errors when `server`
# isn't declared (SERVICES.md §3.2), and a generic project declares
# nothing by default. The bare form ups whatever *is* declared —
# server included — and is a no-op otherwise.
run = "bougie service up --detach"
